name: Build and Release SnipSave Binaries

on:
  push:
    tags:
      - 'v*' # Triggers workflow automatically on any version tags (e.g., v1.0.0)

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Compile Script to Standalone Executable
      uses: tamo/action-Ahk2Exe@v1
      with:
        src: src/SnipSave.ahk
        out: dist/SnipSave.exe
        base: AutoHotkey64.exe

    - name: Bundle Release Package
      run: |
        Compress-Archive -Path dist/SnipSave.exe, install.bat, README.md, LICENSE, CHANGELOG.md -DestinationPath dist/SnipSave-v1.0.0-Windows.zip
      shell: powershell

    - name: Deploy Production Binaries to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SnipSave-v1.0.0-Windows.zip
        body: |
          ## SnipSave Production Build
          
          This release contains the fully compiled binary and the rapid environment setup files for the SnipSave native clipping extension.
          
          ### Installation:
          1. Download and extract `SnipSave-v1.0.0-Windows.zip`.
          2. Right-click and execute `install.bat` to wire up the system environment hooks.
          3. Trigger the extension instantly via the global shortcut: `Ctrl + Shift + S`.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}